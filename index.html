<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Simple, thoughtful apps for everyday life.">
    <title>Apps</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <main class="home-shell">
      <header class="intro">
        <p class="eyebrow">Independent apps</p>
        <h1>Small tools.<br>Thoughtfully made.</h1>
        <p class="intro-copy">Simple apps designed to make everyday things feel a little easier.</p>

      <section class="app-grid" aria-label="Apps">
        <a class="app-card linknexus-card" href="linknexus/">
          <span class="card-icon linknexus-icon" aria-hidden="true">
            <img src="linknexus-icon.png" alt="">
          </span>
          <span class="card-content">
            <span class="card-label">LinkNexus</span>
            <span class="card-description">Save the web. Shape it into collections.</span>
          </span>
          <span class="card-arrow" aria-hidden="true">&#8599;</span>
        </a>

        <a class="app-card lendpal-card" href="lendpal/">
          <span class="card-icon lendpal-icon" aria-hidden="true">
            <img src="app-light.png" alt="">
          </span>
          <span class="card-content">
            <span class="card-label">LendPal</span>
            <span class="card-description">Keep personal loans and repayments clear.</span>
          </span>
          <span class="card-arrow" aria-hidden="true">&#8599;</span>
        </a>
      </section>

      <footer class="site-footer">
        <span>&copy; 2026</span>
        <a href="mailto:lendpal.sup@gmail.com">Get in touch</a>
      </footer>
    </main>

</html>
